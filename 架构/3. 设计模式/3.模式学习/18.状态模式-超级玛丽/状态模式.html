<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
</head>

<body>
  <script>
    var MarryState = function () { // 玛丽的状态
      // 内部状态私有变量
      var _currentState = {}
      // 动作与状态方法映射
      var states = {
          jump() {
            console.log('jump');
          },
          move() {
            console.log('move');
          },
          shoot() {
            console.log('shoot');
          },
          squat() {
            console.log('squat');
          }
        };
      // 动作控制类
      var Action = {
        // 改变状态的方法
        changeState() {
          var arg = arguments;
          _currentState = {} // 进入这里每次都会清空上次的状态
          var len = arg.length;
          if (arg.length) {
            for (var i = 0; i < len; i++) { // 循环每一个值为true?
              _currentState[arg[i]] = true;
            }
            console.log(_currentState);
          }
          return this;
        },
        goes() {
          for (var i in _currentState) {
            states[i] && states[i]()
          }
          return this;
        }
      }
      return {
        change: Action.changeState,
        goes: Action.goes
      }

    }
    MarryState().change('jump').goes().goes()
  </script>
</body>

</html>
