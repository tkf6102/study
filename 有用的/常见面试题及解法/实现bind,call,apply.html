    <script>
        Function.prototype.myBind = function (context) {
            let params = arguments.slice(1);
            let newFn2 = function(){
                let params = [...arguments].concat([...params]);
                obj.call(context,params)
            }
            return newFn2
        }
        let obj = {
            name: '1'
        }

        let fn = function () {
            console.log(this.name);
            console.log(arguments);
        };
        let newFn = fn.bind(obj, 'bind参数');
        newFn('新函数执行参数')
        

    </script>
