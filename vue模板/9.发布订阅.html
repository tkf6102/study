    <script>
        class Events{
            events = []
            on(fn){
                this.events.push(fn)
            }
            emit(){
                this.events.forEach((fn)=>{
                    fn()
                })
            }
            removeAll(){
                this.events = []
            }
            // removeOne(id){
            //     this.events.filter(item=>{
            //         return item.id !== id
            //     })
            // }
        }
        debugger
        let ev = new Events()
        let testFn1 = function(){
            console.log('测试函数1');
        }
        ev.on(testFn1)
        console.log(ev);
        let testFn2 = function(){
            console.log('测试函数2');
        }
        ev.on(testFn2)
        console.log(ev);
        ev.emit()
        console.log(ev);
        ev.removeAll()
        console.log(ev);
    </script>
